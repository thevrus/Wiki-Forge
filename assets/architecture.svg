<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Wiki Forge Architecture</title>
<desc>How Wiki Forge ingests code, git history, PRs, and tickets to produce wiki pages, AI context, and knowledge risk reports</desc>

<style>
  :root {
    --bg: #fff;
    --card: #fafafa;
    --border: #e5e5e5;
    --border-subtle: #eee;
    --text: #171717;
    --text-secondary: #525252;
    --text-muted: #a3a3a3;
    --text-faint: #d4d4d4;
    --accent-green: #16a34a;
    --accent-green-border: #bbf7d0;
    --accent-green-bg: #f0fdf4;
    --accent-purple: #7c3aed;
    --accent-purple-border: #ddd6fe;
    --accent-purple-bg: #f5f3ff;
    --accent-amber: #d97706;
    --accent-amber-border: #fde68a;
    --accent-amber-bg: #fffbeb;
    --accent-blue-start: #2563eb;
    --accent-blue-end: #7c3aed;
    --arrow: #a3a3a3;
    --separator-green: #bbf7d0;
    --separator-purple: #ddd6fe;
    --separator-amber: #fde68a;
    --after-bg: #f0fdf4;
    --after-border: #16a34a;
    --after-accent: #16a34a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0a0a0a;
      --card: #0a0a0a;
      --border: #262626;
      --border-subtle: #1a1a1a;
      --text: #ededed;
      --text-secondary: #888;
      --text-muted: #555;
      --text-faint: #333;
      --accent-green: #3ecf8e;
      --accent-green-border: #1a3a1a;
      --accent-green-bg: rgba(10,26,10,0.3);
      --accent-purple: #7928ca;
      --accent-purple-border: #2a1a3a;
      --accent-purple-bg: rgba(10,10,26,0.3);
      --accent-amber: #f5a623;
      --accent-amber-border: #3a2a0a;
      --accent-amber-bg: rgba(26,26,10,0.3);
      --accent-blue-start: #0070f3;
      --accent-blue-end: #7928ca;
      --arrow: #555;
      --separator-green: #1a3a1a;
      --separator-purple: #2a1a3a;
      --separator-amber: #3a2a0a;
      --after-bg: rgba(10,26,10,0.2);
      --after-border: #3ecf8e;
      --after-accent: #3ecf8e;
    }
  }
  .bg { fill: var(--bg) }
  .card { fill: var(--card) }
  .border { stroke: var(--border); fill: none }
  .border-subtle { stroke: var(--border-subtle); fill: none }
  .text { fill: var(--text) }
  .text-secondary { fill: var(--text-secondary) }
  .text-muted { fill: var(--text-muted) }
  .text-faint { fill: var(--text-faint) }
  .arrow { stroke: var(--arrow) }
  .accent-gradient { stroke: url(#accent) }
  .green { fill: var(--accent-green) }
  .green-border { stroke: var(--accent-green-border) }
  .green-bg { fill: var(--accent-green-bg) }
  .green-sep { stroke: var(--separator-green) }
  .purple { fill: var(--accent-purple) }
  .purple-border { stroke: var(--accent-purple-border) }
  .purple-bg { fill: var(--accent-purple-bg) }
  .purple-sep { stroke: var(--separator-purple) }
  .amber { fill: var(--accent-amber) }
  .amber-border { stroke: var(--accent-amber-border) }
  .amber-bg { fill: var(--accent-amber-bg) }
  .amber-sep { stroke: var(--separator-amber) }
  .after-card { fill: var(--after-bg); stroke: var(--after-border) }
  .after-accent { fill: var(--after-accent) }
  text { font-family: 'Geist', 'Inter', -apple-system, system-ui, sans-serif }
  .mono { font-family: 'Geist Mono', 'SF Mono', 'Menlo', monospace }
</style>

<defs>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="var(--accent-blue-start)"/>
    <stop offset="100%" stop-color="var(--accent-blue-end)"/>
  </linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" class="arrow" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="660" class="bg"/>

<!-- Title -->
<text x="340" y="36" text-anchor="middle" class="text" font-size="16" font-weight="600" letter-spacing="-0.02em">Wiki Forge</text>
<text x="340" y="56" text-anchor="middle" class="text-muted" font-size="11" letter-spacing="0.02em">THE DECISION PROVENANCE ENGINE</text>

<!-- Inputs container -->
<rect x="40" y="78" width="600" height="110" rx="12" class="border" fill="var(--card)"/>
<text x="340" y="98" text-anchor="middle" class="text-muted mono" font-size="10" letter-spacing="0.08em">INPUTS</text>

<!-- Input cards -->
<rect x="56" y="110" width="130" height="62" rx="8" class="border-subtle" fill="var(--card)"/>
<text x="121" y="136" text-anchor="middle" class="text" font-size="12" font-weight="500">Source code</text>
<text x="121" y="154" text-anchor="middle" class="text-muted" font-size="10">Types, functions</text>

<rect x="200" y="110" width="130" height="62" rx="8" class="border-subtle" fill="var(--card)"/>
<text x="265" y="136" text-anchor="middle" class="text" font-size="12" font-weight="500">Git history</text>
<text x="265" y="154" text-anchor="middle" class="text-muted" font-size="10">Commits, blame</text>

<rect x="344" y="110" width="130" height="62" rx="8" class="border-subtle" fill="var(--card)"/>
<text x="409" y="136" text-anchor="middle" class="text" font-size="12" font-weight="500">PRs + issues</text>
<text x="409" y="154" text-anchor="middle" class="text-muted" font-size="10">Discussions, ADRs</text>

<rect x="488" y="110" width="136" height="62" rx="8" class="border-subtle" fill="var(--card)"/>
<text x="556" y="136" text-anchor="middle" class="text" font-size="12" font-weight="500">Ticket trackers</text>
<text x="556" y="154" text-anchor="middle" class="text-muted" font-size="10">Jira, Linear</text>

<!-- Arrow down -->
<line x1="340" y1="188" x2="340" y2="218" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Compilation box -->
<rect x="170" y="218" width="340" height="56" rx="10" fill="var(--card)" class="accent-gradient" stroke-width="1"/>
<text x="340" y="242" text-anchor="middle" class="text" font-size="13" font-weight="500">Two-pass LLM compilation</text>
<text x="340" y="260" text-anchor="middle" class="text-secondary mono" font-size="10">drift detection → synthesis</text>

<!-- Arrows to outputs -->
<line x1="230" y1="274" x2="130" y2="318" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="274" x2="340" y2="318" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="274" x2="550" y2="318" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Output 1: For humans -->
<rect x="40" y="318" width="180" height="130" rx="10" class="green-border" fill="var(--card)"/>
<rect x="40" y="318" width="180" height="130" rx="10" class="green-bg"/>
<text x="130" y="346" text-anchor="middle" class="green" font-size="12" font-weight="600" letter-spacing="0.02em">For humans</text>
<text x="130" y="370" text-anchor="middle" class="text-secondary" font-size="11">Wiki pages with</text>
<text x="130" y="386" text-anchor="middle" class="text-secondary" font-size="11">decision context</text>
<line x1="100" y1="398" x2="160" y2="398" class="green-sep" stroke-width="1"/>
<text x="130" y="416" text-anchor="middle" class="text-muted mono" font-size="10">"Why Express?"</text>
<text x="130" y="432" text-anchor="middle" class="text-muted mono" font-size="10">"Who built this?"</text>

<!-- Output 2: For AI agents -->
<rect x="250" y="318" width="180" height="130" rx="10" class="purple-border" fill="var(--card)"/>
<rect x="250" y="318" width="180" height="130" rx="10" class="purple-bg"/>
<text x="340" y="346" text-anchor="middle" class="purple" font-size="12" font-weight="600" letter-spacing="0.02em">For AI agents</text>
<text x="340" y="370" text-anchor="middle" class="text-secondary" font-size="11">llms.txt</text>
<text x="340" y="386" text-anchor="middle" class="text-secondary" font-size="11">MCP server</text>
<line x1="300" y1="398" x2="380" y2="398" class="purple-sep" stroke-width="1"/>
<text x="340" y="416" text-anchor="middle" class="text-muted mono" font-size="10">why / who / search</text>
<text x="340" y="432" text-anchor="middle" class="text-muted mono" font-size="10">status</text>

<!-- Output 3: For managers -->
<rect x="460" y="318" width="180" height="130" rx="10" class="amber-border" fill="var(--card)"/>
<rect x="460" y="318" width="180" height="130" rx="10" class="amber-bg"/>
<text x="550" y="346" text-anchor="middle" class="amber" font-size="12" font-weight="600" letter-spacing="0.02em">For managers</text>
<text x="550" y="370" text-anchor="middle" class="text-secondary" font-size="11">Knowledge risk</text>
<text x="550" y="386" text-anchor="middle" class="text-secondary" font-size="11">Bus factor per module</text>
<line x1="510" y1="398" x2="590" y2="398" class="amber-sep" stroke-width="1"/>
<text x="550" y="416" text-anchor="middle" class="text-muted mono" font-size="10">Weekly shipping briefs</text>
<text x="550" y="432" text-anchor="middle" class="text-muted mono" font-size="10">Decision coverage</text>

<!-- Arrow to positioning -->
<line x1="340" y1="468" x2="340" y2="500" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Positioning shift -->
<text x="340" y="520" text-anchor="middle" class="text-muted mono" font-size="10" letter-spacing="0.08em">THE POSITIONING SHIFT</text>

<rect x="40" y="536" width="280" height="48" rx="8" class="border" fill="var(--card)"/>
<text x="180" y="556" text-anchor="middle" class="text-muted" font-size="12" font-weight="500">Before: docs from code</text>
<text x="180" y="572" text-anchor="middle" class="text-faint" font-size="10">Commodity, 12 competitors</text>

<line x1="322" y1="560" x2="356" y2="560" class="arrow" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="360" y="536" width="280" height="48" rx="8" class="after-card" fill="var(--card)"/>
<rect x="360" y="536" width="280" height="48" rx="8" fill="var(--after-bg)"/>
<text x="500" y="556" text-anchor="middle" class="text" font-size="12" font-weight="500">After: institutional memory</text>
<text x="500" y="572" text-anchor="middle" class="after-accent" font-size="10">Blue ocean</text>

<!-- Footer -->
<text x="340" y="618" text-anchor="middle" class="text-faint" font-size="11" font-style="italic">"Your codebase remembers. Even when your team forgets."</text>
<text x="340" y="644" text-anchor="middle" class="text-faint mono" font-size="10">Buyer: Engineering manager scared of knowledge loss</text>

</svg>
